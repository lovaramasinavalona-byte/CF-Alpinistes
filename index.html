<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpinistes Executive Education - Madagascar</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .bg-soft { background-color: #E8F1FA; }
        .text-deep { color: #1A3C5E; }
        .bg-deep { background-color: #1A3C5E; }
        .text-action { color: #5B9BD5; }
        .bg-action { background-color: #5B9BD5; }
        .shadow-3xl { box-shadow: 0 35px 60px -15px rgba(26, 60, 94, 0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, doc };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Helper pour rendre les icônes Lucide de manière sécurisée en HTML statique
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const iconElement = window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        attrs: { 
                            stroke: "currentColor", 
                            "stroke-width": 2, 
                            width: size, 
                            height: size,
                            class: className
                        }
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-block"></span>;
        };

        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const appId = window.__app_id || 'alpinistes-edu-default';

        const LogoAlpinistes = ({ className = "" }) => (
            <svg viewBox="0 0 400 400" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="montLeft" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stopColor="#B3D4E9" />
                        <stop offset="100%" stopColor="#6FA8DC" />
                    </linearGradient>
                    <linearGradient id="montCenter" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stopColor="#A2C4E8" />
                        <stop offset="100%" stopColor="#5B9BD5" />
                    </linearGradient>
                </defs>
                <rect x="10" y="10" width="380" height="380" rx="80" fill="#E8F1FA" />
                <polygon points="50,265 115,155 185,265" fill="url(#montLeft)" stroke="#E8F1FA" strokeWidth="12" />
                <polygon points="120,265 200,65 315,265" fill="url(#montCenter)" stroke="#E8F1FA" strokeWidth="12" />
                <polygon points="245,265 295,175 365,265" fill="url(#montLeft)" stroke="#E8F1FA" strokeWidth="12" />
                <polygon points="92,180 115,155 140,195" fill="#FFFFFF" opacity="0.98" />
                <polygon points="165,115 200,65 240,120" fill="#FFFFFF" opacity="0.98" />
                <polygon points="275,195 295,175 315,205" fill="#FFFFFF" opacity="0.98" />
                <line x1="200" y1="65" x2="200" y2="38" stroke="#4A6FA5" strokeWidth="6" />
                <polygon points="200,42 232,44 200,54" fill="#D32F2F" stroke="#B71C1C" strokeWidth="2" />
            </svg>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('site');
            const [user, setUser] = useState(null);
            const [registrations, setRegistrations] = useState([]);
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [adminPasskey, setAdminPasskey] = useState('');
            const [authError, setAuthError] = useState(false);
            const [formData, setFormData] = useState({ fullName: '', email: '', phone: '', program: '' });
            const [status, setStatus] = useState('idle');
            
            const SECRET_PASSKEY = "ALPIN2024";

            useEffect(() => {
                const initFirebase = async () => {
                    if (!window.FirebaseSDK) return;
                    const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.FirebaseSDK;
                    
                    try {
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        
                        const token = window.__initial_auth_token;
                        if (token) {
                            await signInWithCustomToken(auth, token);
                        } else {
                            await signInAnonymously(auth);
                        }
                        
                        onAuthStateChanged(auth, (u) => setUser(u));
                    } catch (err) {
                        console.error("Firebase Auth Error:", err);
                    }
                };
                initFirebase();
            }, []);

            useEffect(() => {
                if (!user || !isAdminAuthenticated) return;
                const { getFirestore, collection, query, onSnapshot } = window.FirebaseSDK;
                const db = getFirestore();
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'));
                
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setRegistrations(data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                }, (err) => console.error("Firestore Listen Error:", err));
                
                return () => unsubscribe();
            }, [user, isAdminAuthenticated]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user) return;
                const { getFirestore, collection, addDoc, serverTimestamp } = window.FirebaseSDK;
                const db = getFirestore();
                setStatus('loading');
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), {
                        ...formData,
                        userId: user.uid,
                        createdAt: serverTimestamp(),
                        status: 'pending'
                    });
                    setStatus('success');
                    setFormData({ fullName: '', email: '', phone: '', program: '' });
                    setTimeout(() => setStatus('idle'), 5000);
                } catch (e) { 
                    console.error("Submit Error:", e);
                    setStatus('error'); 
                }
            };

            const scrollToSection = (id) => {
                const el = document.getElementById(id);
                if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
            };

            const programs = [
                { id: "ai", title: "IA & Futur du Travail", iconName: "Cpu", desc: "Maîtrisez les outils d'IA générative pour décupler la productivité." },
                { id: "cx", title: "L'Art du Service Client", iconName: "MessageCircle", desc: "Transformez chaque interaction en une expérience mémorable." },
                { id: "pm", title: "Gestion de Projet Élite", iconName: "Layout", desc: "Livrez vos projets avec une précision chirurgicale." },
                { id: "lang", title: "Langues pour Leaders", iconName: "Languages", desc: "Brisez les barrières linguistiques internationales." }
            ];

            const Dashboard = () => (
                <div className="min-h-screen bg-slate-50 pt-28 pb-12">
                    {!isAdminAuthenticated ? (
                        <div className="max-w-md mx-auto p-10 bg-white rounded-[2.5rem] shadow-2xl text-center space-y-8">
                            <div className="w-20 h-20 bg-slate-50 rounded-3xl flex items-center justify-center mx-auto text-deep">
                                <LucideIcon name="Lock" size={40} />
                            </div>
                            <h2 className="text-2xl font-black uppercase text-deep">Accès Restreint</h2>
                            <form onSubmit={(e) => { e.preventDefault(); if(adminPasskey === SECRET_PASSKEY) { setIsAdminAuthenticated(true); setAuthError(false); } else setAuthError(true); }} className="space-y-4">
                                <input type="password" placeholder="••••" className={`w-full px-6 py-4 rounded-2xl border-2 text-center text-xl font-bold ${authError ? 'border-red-500' : 'border-slate-100'}`} value={adminPasskey} onChange={e => setAdminPasskey(e.target.value)} />
                                <button className="w-full py-4 bg-deep text-white rounded-2xl font-black uppercase text-xs tracking-widest">Déverrouiller</button>
                            </form>
                        </div>
                    ) : (
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="flex justify-between items-center mb-10">
                                <h1 className="text-3xl font-black uppercase text-deep">Inscriptions ({registrations.length})</h1>
                                <button onClick={() => setIsAdminAuthenticated(false)} className="text-red-500 font-bold text-[10px] uppercase">Sortir</button>
                            </div>
                            <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden overflow-x-auto">
                                <table className="w-full text-left min-w-[600px]">
                                    <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400">
                                        <tr><th className="px-8 py-6">Nom</th><th className="px-8 py-6">Programme</th><th className="px-8 py-6">Contact</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {registrations.map(r => (
                                            <tr key={r.id} className="hover:bg-slate-50/50">
                                                <td className="px-8 py-6 font-black text-sm">{r.fullName}</td>
                                                <td className="px-8 py-6"><span className="text-[10px] font-black uppercase bg-blue-50 text-blue-600 px-3 py-1 rounded-full">{r.program}</span></td>
                                                <td className="px-8 py-6 text-xs text-slate-500">{r.email} <br/> {r.phone}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="min-h-screen">
                    {/* Navigation flottante Statique/Admin */}
                    <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] bg-deep/90 backdrop-blur-xl p-2 rounded-full shadow-2xl flex space-x-2">
                        <button onClick={() => setActiveTab('site')} className={`px-6 py-3 rounded-full text-[9px] font-black uppercase tracking-widest ${activeTab === 'site' ? 'bg-white text-deep' : 'text-white'}`}>Site Vitrine</button>
                        <button onClick={() => setActiveTab('admin')} className={`px-6 py-3 rounded-full text-[9px] font-black uppercase tracking-widest ${activeTab === 'admin' ? 'bg-white text-deep' : 'text-white'}`}>Admin</button>
                    </div>

                    {activeTab === 'admin' ? <Dashboard /> : (
                        <div>
                            {/* Navbar */}
                            <nav className="fixed w-full bg-white/95 backdrop-blur-md z-50 border-b border-blue-50 h-20 flex items-center">
                                <div className="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
                                    <div className="flex items-center space-x-4">
                                        <LogoAlpinistes className="w-10 h-10" />
                                        <div className="flex flex-col uppercase">
                                            <span className="text-lg font-black text-deep leading-none">Alpinistes</span>
                                            <span className="text-[7px] font-bold text-action tracking-[0.4em]">Executive</span>
                                        </div>
                                    </div>
                                    <div className="hidden lg:flex space-x-8">
                                        {['Approche', 'Programmes', 'Inscription'].map(i => (
                                            <button key={i} onClick={() => scrollToSection(i.toLowerCase())} className="text-[10px] font-black uppercase tracking-widest hover:text-blue-500 transition-colors">{i}</button>
                                        ))}
                                    </div>
                                </div>
                            </nav>

                            {/* Hero */}
                            <section className="pt-40 pb-20 bg-soft min-h-screen flex items-center">
                                <div className="max-w-7xl mx-auto px-6">
                                    <div className="max-w-3xl space-y-12">
                                        <div className="inline-flex items-center space-x-2 px-4 py-2 bg-white rounded-full text-[10px] font-black uppercase text-action">
                                            <LucideIcon name="Zap" size={14} />
                                            <span>Leaders de demain</span>
                                        </div>
                                        <h1 className="text-6xl lg:text-[100px] font-black leading-[0.85] text-deep uppercase tracking-tighter">LA HAUTEUR <br/><span className="text-action italic">COMME NORME.</span></h1>
                                        <p className="text-xl lg:text-2xl font-medium border-l-4 border-red-600 pl-8 text-slate-700">Nous forgions les Alpinistes de l'économie malgache, capables de conquérir tous les sommets.</p>
                                        <button onClick={() => scrollToSection('programmes')} className="bg-deep text-white px-10 py-6 rounded-3xl font-black text-xs uppercase tracking-widest shadow-2xl flex items-center group">
                                            Découvrir les cursus <LucideIcon name="ChevronRight" size={16} className="ml-2 group-hover:translate-x-1 transition-transform" />
                                        </button>
                                    </div>
                                </div>
                            </section>

                            {/* Approche */}
                            <section id="approche" className="py-32 bg-white">
                                <div className="max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-20 items-center">
                                    <div className="space-y-8">
                                        <h2 className="text-5xl font-black uppercase text-deep">Une Pédagogie <br/><span className="text-action">de Haute Altitude</span></h2>
                                        <p className="text-lg text-slate-600">La théorie sans exécution est un poids mort. Notre approche repose sur la mise en situation réelle et le mentorat direct par des experts du terrain.</p>
                                        <div className="grid gap-6">
                                            {[
                                                {icon: "Target", t: "Focus Résultats"}, 
                                                {icon: "TrendingUp", t: "Élite Locale"}, 
                                                {icon: "ShieldCheck", t: "Certification Internationale"}
                                            ].map((item, i) => (
                                                <div key={i} className="flex items-center space-x-6 p-6 rounded-3xl bg-slate-50 border border-slate-100">
                                                    <div className="text-blue-500"><LucideIcon name={item.icon} size={28} /></div>
                                                    <h4 className="font-black uppercase text-xs tracking-widest text-deep">{item.t}</h4>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="aspect-[4/5] bg-slate-100 rounded-[3rem] shadow-2xl overflow-hidden relative group">
                                        <div className="absolute inset-0 bg-deep/10 group-hover:bg-transparent transition-colors"></div>
                                        <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=1000" alt="Training" className="w-full h-full object-cover" />
                                    </div>
                                </div>
                            </section>

                            {/* Programmes */}
                            <section id="programmes" className="py-32 bg-slate-50">
                                <div className="max-w-7xl mx-auto px-6">
                                    <div className="text-center mb-20">
                                        <h2 className="text-5xl font-black uppercase text-deep">Nos Filières d'Excellence</h2>
                                    </div>
                                    <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
                                        {programs.map((p, i) => (
                                            <div key={i} className="bg-white p-10 rounded-[2.5rem] shadow-sm hover:shadow-2xl transition-all border border-slate-100 flex flex-col group">
                                                <div className="mb-8 p-4 bg-blue-50 rounded-2xl w-fit text-blue-500 group-hover:bg-blue-500 group-hover:text-white transition-colors">
                                                    <LucideIcon name={p.iconName} size={32} />
                                                </div>
                                                <h3 className="text-xl font-black uppercase text-deep mb-4">{p.title}</h3>
                                                <p className="text-sm text-slate-500 mb-8 flex-grow">{p.desc}</p>
                                                <button onClick={() => { setFormData({...formData, program: p.title}); scrollToSection('inscription'); }} className="w-full py-4 bg-slate-50 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-deep hover:text-white transition-all">S'inscrire</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>

                            {/* Inscription */}
                            <section id="inscription" className="py-32 bg-white">
                                <div className="max-w-7xl mx-auto px-6">
                                    <div className="bg-deep rounded-[4rem] flex flex-col lg:flex-row shadow-3xl overflow-hidden">
                                        <div className="lg:w-1/2 p-12 lg:p-20 text-white space-y-8 flex flex-col justify-center">
                                            <h2 className="text-5xl lg:text-6xl font-black uppercase leading-none">Prêt pour <br/><span className="text-blue-300 italic">l'Ascension ?</span></h2>
                                            <p className="text-xl opacity-70">Remplissez le formulaire et un consultant pédagogique analysera votre profil sous 24h.</p>
                                            <div className="flex items-center space-x-4 pt-6">
                                                <div className="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center"><LucideIcon name="Phone" size={20} /></div>
                                                <span className="font-bold">+261 34 00 000 00</span>
                                            </div>
                                        </div>
                                        <div className="lg:w-1/2 bg-soft p-8 lg:p-20">
                                            {status === 'success' ? (
                                                <div className="h-full flex flex-col items-center justify-center space-y-6 py-10">
                                                    <LucideIcon name="CheckCircle2" size={80} className="text-green-500" />
                                                    <div className="text-center">
                                                        <h3 className="text-2xl font-black uppercase text-deep">Candidature Reçue</h3>
                                                        <p className="text-slate-500 mt-2 font-bold uppercase text-xs">Nous reviendrons vers vous très vite.</p>
                                                    </div>
                                                </div>
                                            ) : (
                                                <form onSubmit={handleSubmit} className="space-y-6">
                                                    <div className="space-y-4">
                                                        <input required value={formData.fullName} onChange={e => setFormData({...formData, fullName: e.target.value})} placeholder="Nom Complet" className="w-full px-8 py-5 rounded-2xl font-bold border-2 border-transparent focus:border-blue-400 outline-none transition-all" />
                                                        <input required type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} placeholder="Email Professionnel" className="w-full px-8 py-5 rounded-2xl font-bold border-2 border-transparent focus:border-blue-400 outline-none transition-all" />
                                                        <input required value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} placeholder="Téléphone (WhatsApp)" className="w-full px-8 py-5 rounded-2xl font-bold border-2 border-transparent focus:border-blue-400 outline-none transition-all" />
                                                        <select required value={formData.program} onChange={e => setFormData({...formData, program: e.target.value})} className="w-full px-8 py-5 rounded-2xl font-bold bg-white border-2 border-transparent focus:border-blue-400 outline-none transition-all appearance-none cursor-pointer">
                                                            <option value="">Sélectionnez un cursus</option>
                                                            {programs.map(p => <option key={p.id} value={p.title}>{p.title}</option>)}
                                                        </select>
                                                    </div>
                                                    <button disabled={status === 'loading'} className="w-full py-6 bg-deep text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl hover:scale-[1.02] active:scale-95 transition-all disabled:opacity-50">
                                                        {status === 'loading' ? 'Envoi en cours...' : 'Valider ma candidature'}
                                                    </button>
                                                </form>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </section>

                            {/* Footer */}
                            <footer className="py-20 bg-deep text-center">
                                <LogoAlpinistes className="w-12 h-12 mx-auto mb-6 opacity-20" />
                                <div className="space-y-4">
                                    <p className="text-white/40 text-[9px] font-black uppercase tracking-[0.3em]">Alpinistes Executive Education • Madagascar</p>
                                    <p className="text-white/10 text-[8px] uppercase tracking-widest font-bold">© 2024 - Tous droits réservés</p>
                                </div>
                            </footer>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
